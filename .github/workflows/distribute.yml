name: deploy-to-firebase

on:
  push:
    branches: [main]


jobs:
  unitTest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup jdk-17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: grant execution permission
        run: chmod +x gradlew

      - name: run unit tests
        run: ./gradlew clean testDebugUnitTest

  distribute:
    name: distribute-to-firebase
    needs: unitTest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup jdk-17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: build-release
        run: ./gradlew assembleRelease

      - name: debug firebase service account
        run: |
          echo '${{ secrets.CREDENTIALS_FILE_CONTENT }}' > firebase-service-account.json
          echo "Service account project:"
          jq -r '.project_id' firebase-service-account.json
          echo "Service account email:"
          jq -r '.client_email' firebase-service-account.json
          echo "Firebase app id:"
          echo '${{ secrets.APP_ID }}'  

      - name: upload-to-firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.APP_ID}}
          serviceCredentialsFileContent: ${{secrets.CREDENTIALS_FILE_CONTENT}}
          groups: testers
          file: app/build/outputs/apk/release/app-release-unsigned.apk

  distribute-to-google-play:
    name: distribute-to-google-play
    needs: unitTest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup jdk-17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: bump version
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{github.run_number}}

      - name: assemble release bundle
        run: ./gradlew bundleRelease

      - name: sign release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{secrets.KEYSTORE}}
          keyStorePassword: ${{secrets.KEYSTORE_PASSWORD}}
          alias: ${{secrets.ATLUNCH2_ALIAS}}
          keyPassword: ${{secrets.ATLUNCH2_ALIAS_PASSWORD}}

      - name: auth google play store
        run: echo '${{secrets.CREDENTIALS_FILE_CONTENT}}' > service_account.json

      - name: distribute to internal track
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: service_account.json
          packageName: dkmak.atlunch
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: 'internal'
          status: 'completed'
          whatsNewDirectory: whatsNew/

