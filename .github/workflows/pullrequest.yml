name: pull-request

on:
  pull_request:
    branches: [main]


jobs:
  unitTest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup jdk-17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: grant execution permission
        run: chmod +x gradlew
        
      - name: run unit tests
        run: ./gradlew clean testDebugUnitTest